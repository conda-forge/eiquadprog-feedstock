{% set name = "eiquadprog" %}
{% set version = "1.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/stack-of-tasks/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: e659462ec435d6a9979378de5c5af04972b35588698ab4ae7cc5d27a32e7e409

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - make  # [not win]
    - ninja  # [win]
  host:
    - eigen
  run:
    - eigen
test:
  requires:
    - pkg-config
  commands:
    - pkg-config --modversion {{ name }}  # [not osx or not arm64] 

about:
  home: http://github.com/stack-of-tasks/eiquadprog
  license: LGPL-3.0-or-later
  license_file: COPYING.LESSER
  summary: C++ implementations of the algorithm of Goldfarb and Idnani for the solution of a (convex) Quadratic Programming problem by means of a dual method
  dev_url: https://github.com/stack-of-tasks/eiquadprog

extra:
  recipe-maintainers:
    - jorisv
    - jcarpent
    - EtienneAr
